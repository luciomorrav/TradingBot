general:
  mode: live  # paper | live
  capital_usd: 340
  log_level: INFO

polymarket:
  private_key: ${POLY_PRIVATE_KEY}     # Ethereum/Polygon wallet private key (for EIP-712 signing)
  api_key: ${POLY_API_KEY}             # CLOB API key (derived from private key)
  api_secret: ${POLY_API_SECRET}       # CLOB API secret (derived from private key)
  api_passphrase: ${POLY_API_PASSPHRASE}  # CLOB API passphrase (derived from private key)
  funder_address: "0xEEe5a29e61fe30fc779E91f3A334f0A097c74d0F"  # Proxy wallet (holds USDC)
  chain_id: 137  # Polygon mainnet
  min_profit_threshold: 0.015  # 1.5% mínimo
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  max_position_per_market: 12  # USD — Phase 3 tighter exposure
  paper_fee_rate: 0.000  # Polymarket maker fee = 0% — paper mode matches live
  market_maker:
    enabled: false        # MM disabled — accumulates inventory at $340 capital
    target_spread: 0.02  # 2c min spread (A-S floor)
    max_inventory: 12    # USD — cap directional exposure per token
    repost_threshold: 0.02  # repost if market moves > 2c
    order_ttl: 300        # seconds — longer time-in-book = better price-time priority
    quote_cooldown: 20    # seconds between signals per token (only matters after cancel)
    min_volume: 500       # raised: better quality markets
    max_volume: 10000
    max_markets: 2        # concentrated: 2 markets for $340 capital
    min_liquidity: 100    # raised: skip thin books (was 50)
    gamma: 7.0            # A-S risk aversion (was 5 → spread ~3.3c, reduces adverse selection)
    kappa: 150.0          # A-S order intensity (was 100 → tighter spread)
    min_order_shares: 5   # Polymarket minimum order size (shares)
    max_total_inventory_pct: 25  # global BUY gate: block new buys when total inventory > 25% equity
    min_hours_to_expiry: 72  # 3 days min — blocks sports/short-resolution markets
    excluded_categories:  # category filter (if API provides it)
      - "Sports"
    excluded_keywords:    # belt-and-suspenders sports filter
      - "vs."
      - " vs "
      - "match"
      - "winner of"
      - "qualify"
      - "FIFA"
      - "World Cup"
      - "Serie A"
      - "La Liga"
      - "Premier League"
      - "Bundesliga"
      - "Ligue 1"
      - "Champions League"
      - "Europa League"
      - "UFC"
      - "NBA"
      - "NFL"
      - "MLB"
      - "NHL"
      - "ATP"
      - "WTA"
      - "IPL"
      - "MLS"
      - "F1"
      - "Grand Prix"
    scoring:
      depth_target: 500      # USD — ideal book depth for low slippage
      volume_target: 2000    # USD — ideal daily volume for fast fills
      weights:
        balance: 0.30        # was 0.40 — still important but deprioritized
        depth: 0.20          # was 0.25
        volume: 0.25         # daily volume (more = faster fills)
        expiry: 0.25         # was 0.10 — prioritize long-dated markets
  news_edge:
    enabled: true
    shadow_mode: true            # log signals only, no real orders — validate 5-7 days first
    edge_threshold: 0.12         # LLM must differ from market by >12%
    min_confidence: 0.65         # LLM must be >65% confident
    max_position_per_market: 10  # USD per directional bet
    strategy_cap_pct: 10.0       # max 10% of equity for News Edge total
    max_markets: 10              # markets to scan per cycle
    cooldown_hours: 12           # don't re-analyze same market within 12h
    take_profit_pct: 0.20        # close at +20%
    stop_loss_pct: 0.15          # close at -15%
    max_hold_hours: 48           # force close after 48h
    market_refresh_seconds: 3600 # refresh shortlist every hour
    min_volume: 1000             # higher volume = more newsworthy markets
    min_hours_to_expiry: 48      # 2 days min
    max_end_date_days: 30        # skip markets expiring in >30 days (long-term = no news edge)
    min_yes_price: 0.08          # skip obvious No (Yes < 8c)
    max_yes_price: 0.92          # skip obvious Yes (Yes > 92c)
    excluded_categories:
      - "Sports"
    excluded_keywords:
      - "vs."
      - " vs "
      - "match"
      - "winner of"
      - "qualify"
      - "FIFA"
      - "World Cup"
      - "Serie A"
      - "La Liga"
      - "Premier League"
      - "Bundesliga"
      - "Ligue 1"
      - "Champions League"
      - "Europa League"
      - "UFC"
      - "NBA"
      - "NFL"
      - "MLB"
      - "NHL"
      - "ATP"
      - "WTA"
      - "IPL"
      - "MLS"
      - "F1"
      - "Grand Prix"

ib:
  host: 127.0.0.1
  port: 4002  # 4002 = paper, 4001 = live
  client_id: 1
  # Universe to scan for cointegration (strategy picks best pairs dynamically)
  universe:
    sector_etfs: [XLE, XOP, XLF, KBE, GDX, GDXJ, XLK, VGT, XLV, XBI]
    large_cap: [KO, PEP, V, MA, JPM, BAC, HD, LOW, MSFT, AAPL]
    commodities: [GLD, GDX, USO, SLV, PAAS]
    index: [SPY, IVV, QQQ, QQQM, IWM, VTWO]
    dual_class: [[GOOG, GOOGL]]
  # Cointegration scanner params
  scanner:
    lookback_days: 120       # rolling window for Engle-Granger test
    rescan_hours: 24         # re-scan universe every N hours
    max_active_pairs: 5      # max simultaneous pairs traded
    min_half_life: 5         # days — skip pairs that revert too fast (noise)
    max_half_life: 60        # days — skip pairs that revert too slow
  zscore_entry: 2.0
  zscore_exit: 0.5
  zscore_stop: 3.5
  cointegration_pvalue: 0.05

kalshi:  # Fase 4
  api_key: ${KALSHI_API_KEY}
  demo_mode: true

llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  fallback_model: claude-sonnet-4-6
  validate_model_on_startup: true
  api_key: ${ANTHROPIC_API_KEY}
  max_cost_per_day: 0.50

risk:
  max_daily_drawdown_pct: 10.0
  max_position_pct: 20.0
  max_total_exposure_pct: 60.0
  consecutive_loss_cooldown: 3
  cooldown_minutes: 30
  execution_degradation:
    min_fill_rate: 0.80
    max_slippage_pct: 1.0
    max_latency_seconds: 5

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
  daily_summary_hour_utc: 22
